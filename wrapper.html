<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>来店きっかけアンケート</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#FDF8F0}
.frame-wrap{width:100%;height:100%;overflow:auto;-webkit-overflow-scrolling:touch}
iframe{width:100%;height:100%;min-height:100%;border:none;display:block}
</style>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
<div class="frame-wrap">
<iframe id="frame" scrolling="yes"></iframe>
</div>
<script>
var GAS_BASE_URL='https://script.google.com/macros/s/AKfycbwEN1YHqdtRBTzrDeTubpQYfyztQA65G2n9JeTDag2V0lk8YfYr_YJtR7V2-tFpbeZN/exec';
var LIFF_ID='2009617550-Sv1tdNVI';

var params=new URLSearchParams(window.location.search);
var store=params.get('store')||'';
var page=params.get('page')||'';

var src=GAS_BASE_URL;
var gp=['source=LINE'];
if(page)gp.push('page='+encodeURIComponent(page));
if(store)gp.push('store='+encodeURIComponent(store));
src+='?'+gp.join('&');
document.getElementById('frame').src=src;

liff.init({liffId:LIFF_ID}).then(function(){
  if(liff.isLoggedIn()){
    liff.getProfile().then(function(profile){
      var uid=profile.userId||'';
      var fr=document.getElementById('frame');
      fr.onload=function(){fr.contentWindow.postMessage({type:'lineUid',uid:uid},'*');};
      try{fr.contentWindow.postMessage({type:'lineUid',uid:uid},'*');}catch(e){}
    });
  }
}).catch(function(){});
</script>
</body>
</html>
